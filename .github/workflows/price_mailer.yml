name: Price Mailer

on:
  # Запуск вручную через интерфейс GitHub Actions
  workflow_dispatch:

  # Запуск по расписанию: каждый будний день в 10:00 по Москве (7:00 UTC)
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  run_mailer:
    runs-on: ubuntu-latest

    steps:
    # 1. Загружаем код из репозитория
    - name: Check out repository code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python нужной версии
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Запускаем скрипт рассылки
    - name: Run price mailer script
      env:
        # Передаем пароли из секретов GitHub в переменные окружения
        IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: python price_mailer/price_mailer.py
